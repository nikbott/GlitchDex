# Production Database Configuration (PostgreSQL example)
spring.datasource.url=jdbc:postgresql://localhost:5432/glitchdex
spring.datasource.username=your_prod_username
spring.datasource.password=your_prod_password
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA/Hibernate Configuration for Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# HikariCP Connection Pool Settings for Production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
# Logging Configuration for Production
logging.level.org.springframework=WARN
logging.level.br.ufscar.glitchdex=INFO
# Disable stack traces in error responses for security
server.error.include-stacktrace=never
# Thymeleaf cache enabled for production
spring.thymeleaf.cache=true
# Server Thread Pool Configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
# HTTP Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json
server.compression.min-response-size=2048