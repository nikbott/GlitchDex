<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}" th:text="#{header.brand}">GlitchDex</a>
            <button aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"
                    class="navbar-toggler"
                    data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/dashboard}" th:text="#{header.home.dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/strategies}" th:text="#{home.strategies_title}">Strategies</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}" th:text="#{header.users}">Users</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a aria-expanded="false" class="nav-link dropdown-toggle d-flex align-items-center"
                           data-bs-toggle="dropdown" href="#"
                           id="languageDropdown" role="button">
                            <span class="flag-icon me-2"
                                  th:classappend="${'flag-icon-' + currentLanguage.countryCode}"></span>
                            <span th:text="${currentLanguage.name}"></span>
                        </a>
                        <ul aria-labelledby="languageDropdown" class="dropdown-menu">
                            <li th:each="lang : ${languages}">
                                <a class="dropdown-item d-flex align-items-center"
                                   th:classappend="${lang.code == currentLanguage.code} ? 'active' : ''"
                                   th:href="@{?lang={code}(code=${lang.code})}">
                                    <span class="flag-icon me-2"
                                          th:classappend="${'flag-icon-' + lang.countryCode}"></span>
                                    <span th:text="${lang.name}"></span>
                                </a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form class="d-flex" method="post" th:action="@{/logout}">
                            <span class="navbar-text me-3" sec:authentication="name"></span>
                            <button class="btn btn-outline-light" th:text="#{header.logout}" type="submit">Logout
                            </button>
                        </form>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="btn btn-outline-light" th:href="@{/login}" th:text="#{header.login}">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
