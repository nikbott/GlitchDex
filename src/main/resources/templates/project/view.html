<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{project.view.title}">Project Details</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2 th:text="#{project.view.header}">Project Details</h2>
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title" th:text="${project.name}"></h5>
                <h6 class="card-subtitle mb-2 text-muted" th:text="#{form.description}">Description</h6>
                <p class="card-text" th:text="${project.description}"></p>
                <h6 class="card-subtitle mb-2 text-muted" th:text="#{project.view.creation_date}">Creation Date</h6>
                <p class="card-text"
                   th:text="${#temporals.format(project.createdAt, #messages.msg('datetime.format'))}"></p>
                <a class="btn btn-secondary mt-3" sec:authorize="hasAuthority('ADMIN')"
                   th:href="@{/projects/{id}/edit(id=${project.id})}" th:text="#{project.view.edit_button}">Edit
                    Project</a>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
            <h3 th:text="#{project.view.test_sessions}">Test Sessions</h3>
            <a class="btn btn-primary" th:href="@{/projects/{projectId}/sessions/new(projectId=${project.id})}"
               th:text="#{project.view.new_session}">New Test Session</a></div>
        <table class="table table-hover">
            <thead>
            <tr>
                <th scope="col" th:text="#{project.view.session.id}">ID</th>
                <th scope="col" th:text="#{project.view.session.tester}">Tester</th>
                <th scope="col" th:text="#{project.view.session.status}">Status</th>
                <th scope="col" th:text="#{project.view.session.date}">Date</th>
                <th scope="col" th:text="#{form.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="testSession : ${sessions}">
                <td th:text="${testSession.id}"></td>
                <td th:text="${testSession.testerName}"></td>
                <td><span class="badge"
                          th:classappend="${testSession.status?.name() == 'CREATED' ? 'bg-secondary' : (testSession.status?.name() == 'IN_EXECUTION' ? 'bg-primary' : (testSession.status?.name() == 'FINALIZED' ? 'bg-success' : 'bg-warning'))}"
                          th:text="${testSession.status?.name() ?: 'UNKNOWN'}"></span></td>
                <td th:text="${#temporals.format(testSession.createdAt, #messages.msg('datetime.format'))}"></td>
                <td>
                    <a class="btn btn-sm btn-info"
                       th:href="@{/projects/{projectId}/sessions/{id}(projectId=${project.id}, id=${testSession.id})}"
                       th:text="#{home.view_details}">Details</a>
                </td>
            </tr>
            <tr th:if="${sessions.isEmpty()}">
                <td class="text-center" colspan="5" th:text="#{project.view.no_sessions}">No test sessions found for
                    this project.
                </td>
            </tr>
            </tbody>
        </table>
        <a class="btn btn-secondary mt-3" th:href="@{/home}" th:text="#{project.view.back_to_home}">Back to Home</a>
    </div>
</section>
</body>
</html>
