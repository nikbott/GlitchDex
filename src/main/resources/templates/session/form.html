<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Test Session</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2>Create Test Session</h2>
        <form th:action="@{/projects/{projectId}/sessions(projectId=${testSessionRequest.projectId})}"
              th:object="${testSessionRequest}" method="post">

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input type="text" class="form-control" id="description" th:field="*{description}" required>
            </div>

            <div class="mb-3">
                <label for="durationInMinutes" class="form-label">Duration (minutes)</label>
                <input type="number" class="form-control" id="durationInMinutes" th:field="*{durationInMinutes}" required>
            </div>

            <div class="mb-3">
                <label for="strategyId" class="form-label">Strategy</label>
                <select class="form-select" id="strategyId" th:field="*{strategyId}" required>
                    <option th:each="strategy : ${strategies}" th:value="${strategy.id}" th:text="${strategy.name}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Create Session</button>
            <a class="btn btn-secondary" th:href="@{/projects/{id}(id=${testSessionRequest.projectId})}">Cancel</a>
        </form>
    </div>
</section>
</body>
</html>
