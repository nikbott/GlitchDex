<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="|Session ${testSession.id} - ${project.name}|">Session Details</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2 th:text="|Session ${testSession.id}|">Session Details</h2>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title" th:text="${testSession.description}"></h5>
                <p class="card-text">
                    <strong>Status:</strong>
                    <span class="badge"
                          th:classappend="${testSession.status?.name() == 'CREATED' ? 'bg-secondary' : (testSession.status?.name() == 'IN_EXECUTION' ? 'bg-primary' : (testSession.status?.name() == 'FINALIZED' ? 'bg-success' : 'bg-warning'))}"
                          th:text="${testSession.status?.name() ?: 'UNKNOWN'}"></span>
                </p>
                <p class="card-text"><strong>Tester:</strong> <span th:text="${testSession.testerName}"></span></p>
                <p class="card-text"><strong>Criada em:</strong> <span
                        th:text="${#temporals.format(testSession.createdAt, #messages.msg('datetime.format'))}"></span></p>

                <!-- Mostrar timestamp de início se a sessão foi iniciada -->
                <p class="card-text" th:if="${testSession.startTimestamp != null}">
                    <strong>Iniciada em:</strong>
                    <span th:text="${#temporals.format(testSession.startTimestamp, #messages.msg('datetime.format'))}"></span>
                </p>

                <!-- Mostrar timestamp de finalização se a sessão foi finalizada -->
                <p class="card-text" th:if="${testSession.finalizationTimestamp != null}">
                    <strong>Finalizada em:</strong>
                    <span th:text="${#temporals.format(testSession.finalizationTimestamp, #messages.msg('datetime.format'))}"></span>
                </p>

                <!-- Controles da Sessão -->
                <div class="mt-3 mb-3">
                    <!-- Botão Iniciar - só aparece se status for CREATED -->
                    <form th:if="${testSession.status?.name() == 'CREATED'}"
                          method="POST"
                          th:action="@{/projects/{projectId}/sessions/{id}/start(projectId=${project.id}, id=${testSession.id})}"
                          style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-success me-2">
                            <i class="fas fa-play"></i> Iniciar Sessão
                        </button>
                    </form>

                    <!-- Botão Finalizar - só aparece se status for IN_EXECUTION -->
                    <form th:if="${testSession.status?.name() == 'IN_EXECUTION'}"
                          method="POST"
                          th:action="@{/projects/{projectId}/sessions/{id}/finish(projectId=${project.id}, id=${testSession.id})}"
                          style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger me-2"
                                onclick="return confirm('Tem certeza que deseja finalizar esta sessão?')">
                            <i class="fas fa-stop"></i> Finalizar Sessão
                        </button>
                    </form>
                </div>

                <a class="btn btn-primary" th:href="@{/bugs/new(testSessionId=${testSession.id})}">Report a Bug</a>
            </div>
        </div>
        <a class="btn btn-secondary mt-3" th:href="@{/projects/{id}(id=${project.id})}">Back to Project</a>
    </div>
</section>
</body>
</html>
