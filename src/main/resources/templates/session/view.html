<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="|Session ${session.id} - ${project.name}|">Session Details</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2 th:text="|Session ${session.id}|">Session Details</h2>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title" th:text="${session.description}"></h5>
                <p class="card-text">
                    <strong>Status:</strong>
                    <span class="badge"
                          th:classappend="${session.status?.name() == 'CREATED' ? 'bg-secondary' : (session.status?.name() == 'IN_EXECUTION' ? 'bg-primary' : (session.status?.name() == 'FINALIZED' ? 'bg-success' : 'bg-warning'))}"
                          th:text="${session.status?.name() ?: 'UNKNOWN'}"></span>
                </p>
                <p class="card-text"><strong>Tester:</strong> <span th:text="${session.testerName}"></span></p>
                <p class="card-text"><strong>Date:</strong> <span
                        th:text="${#temporals.format(session.createdAt, #messages.msg('datetime.format'))}"></span></p>
                <a class="btn btn-primary" th:href="@{/bugs/new(testSessionId=${session.id})}">Report a Bug</a>
            </div>
        </div>
        <a class="btn btn-secondary mt-3" th:href="@{/projects/{id}(id=${project.id})}">Back to Project</a>
    </div>
</section>
</body>
</html>
