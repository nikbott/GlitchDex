<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{home.title}">Home</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <div sec:authorize="isAuthenticated()">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 th:text="#{home.projects}">My Projects</h3>
                <div class="d-flex align-items-center">
                    <div class="dropdown me-2">
                        <button aria-expanded="false" class="btn btn-outline-secondary dropdown-toggle"
                                data-bs-toggle="dropdown"
                                id="sortDropdown" th:text="#{home.sort_by}" type="button">
                            Sort By
                        </button>
                        <ul aria-labelledby="sortDropdown" class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/home(sort='name', order='asc')}"
                                   th:text="#{home.sort.name_asc}">Name (A-Z)</a></li>
                            <li><a class="dropdown-item" th:href="@{/home(sort='name', order='desc')}"
                                   th:text="#{home.sort.name_desc}">Name (Z-A)</a></li>
                            <li><a class="dropdown-item" th:href="@{/home(sort='createdAt', order='desc')}"
                                   th:text="#{home.sort.newest}">Newest First</a></li>
                            <li><a class="dropdown-item" th:href="@{/home(sort='createdAt', order='asc')}"
                                   th:text="#{home.sort.oldest}">Oldest First</a></li>
                        </ul>
                    </div>
                    <a class="btn btn-primary" sec:authorize="hasAuthority('ADMIN')" th:href="@{/projects/new}"
                       th:text="#{home.new_project}">New Project</a>
                </div>
            </div>

            <div class="row">
                <div class="col text-center py-5" th:if="${projects.isEmpty()}">
                    <h4 th:text="#{home.no_projects}">No projects found.</h4>
                    <p sec:authorize="hasAuthority('ADMIN')"><a th:href="@{/projects/new}" th:text="#{home.create_now}">Create
                        one now!</a></p>
                </div>
                <div class="col-md-4 mb-4" th:each="project : ${projects}">
                    <div class="card h-100 card-project">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${project.name}">Project Name</h5>
                            <p class="card-text" th:text="${project.description}">Project Description</p>
                        </div>
                        <div class="card-footer d-flex justify-content-between align-items-center">
                            <a class="btn btn-primary" th:href="@{/projects/{id}(id=${project.id})}"
                               th:text="#{home.view_details}">View Details</a>
                            <div class="dropdown" sec:authorize="hasAuthority('ADMIN')">
                                <button aria-expanded="false" class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                        data-bs-toggle="dropdown" id="projectOptions" type="button">
                                    <span th:text="#{home.more_options}">More Options</span>
                                </button>
                                <ul aria-labelledby="projectOptions" class="dropdown-menu">
                                    <li><a class="dropdown-item"
                                           th:href="@{/projects/{id}/edit(id=${project.id})}"
                                           th:text="#{form.edit}">Edit</a></li>
                                    <li>
                                        <form method="post" th:action="@{/projects/{id}/delete(id=${project.id})}">
                                            <button class="dropdown-item text-danger"
                                                    onclick="return confirm('Are you sure you want to delete this project?')"
                                                    th:text="#{form.delete}"
                                                    type="submit">Delete
                                            </button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
