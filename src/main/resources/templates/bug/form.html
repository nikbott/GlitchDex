<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${isEditMode} ? #{bug.form.edit_title} : #{bug.form.title}">Bug Form</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2 th:text="${isEditMode} ? #{bug.form.edit_header} : #{bug.form.header}">Bug Form</h2>

        <div class="mb-3" th:if="${isEditMode and bug != null and bug.attachments != null and !bug.attachments.isEmpty()}">
            <label class="form-label" th:text="#{bug.view.current_attachments}">Anexos Atuais</label>
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-center"
                    th:each="attachment : ${bug.attachments}">
                    <a th:href="@{/files/{filename}(filename=${attachment.filename})}" target="_blank" th:text="${attachment.filename}">Attachment Name</a>
                    <form class="d-inline" method="post"
                          th:action="@{|/bugs/${bug.id}/attachments/${attachment.id}/delete|}"
                          th:attr="onsubmit='return confirm(\'' + #{form.delete.confirm.attachment} + '\');'">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-danger btn-sm" th:text="#{form.delete.attachment}">Excluir Anexo</button>
                    </form>
                </li>
            </ul>
        </div>

        <div class="mb-3" th:if="${isEditMode and (bug == null or bug.attachments == null or bug.attachments.isEmpty())}">
            <p th:text="#{bug.view.no_attachment}">Nenhum anexo fornecido.</p>
        </div>

        <form enctype="multipart/form-data" method="post"
              th:action="@{${formAction}}"
              th:object="${bugRequest}">
            <input th:field="*{testSessionId}" type="hidden"/>
            <input th:field="*{projectId}" type="hidden"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />


            <div class="mb-3">
                <label class="form-label" for="title" th:text="#{bug.form.bug_title}">Title</label>
                <input class="form-control" id="title" required th:field="*{title}" type="text"/>
                <span class="text-danger" th:errors="*{title}" th:if="${#fields.hasErrors('title')}"></span>
            </div>

            <div class="mb-3">
                <label class="form-label" for="description" th:text="#{form.description}">Description</label>
                <textarea class="form-control" id="description" rows="3" th:field="*{description}"></textarea>
                <span class="text-danger" th:errors="*{description}" th:if="${#fields.hasErrors('description')}"></span>
            </div>

            <div class="mb-3">
                <label class="form-label" for="stepsToReproduce" th:text="#{bug.form.steps}">Steps to Reproduce</label>
                <textarea class="form-control" id="stepsToReproduce" rows="5" th:field="*{stepsToReproduce}"></textarea>
                <span class="text-danger" th:errors="*{stepsToReproduce}"
                      th:if="${#fields.hasErrors('stepsToReproduce')}"></span>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="status" th:text="#{bug.form.status}">Status</label>
                    <select class="form-select" id="status" th:field="*{status}">
                        <option th:each="s : ${T(br.ufscar.glitchdex.domain.BugStatus).values()}"
                                th:text="#{'bug.status.' + ${s}}"
                                th:value="${s}"></option>
                    </select>
                    <span class="text-danger" th:errors="*{status}" th:if="${#fields.hasErrors('status')}"></span>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="severity" th:text="#{bug.form.severity}">Severity</label>
                    <select class="form-select" id="severity" th:field="*{severity}">
                        <option th:each="s : ${T(br.ufscar.glitchdex.domain.BugSeverity).values()}"
                                th:text="#{'bug.severity.' + ${s}}"
                                th:value="${s}"></option>
                    </select>
                    <span class="text-danger" th:errors="*{severity}" th:if="${#fields.hasErrors('severity')}"></span>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="priority" th:text="#{bug.form.priority}">Priority</label>
                    <select class="form-select" id="priority" th:field="*{priority}">
                        <option th:each="p : ${T(br.ufscar.glitchdex.domain.BugPriority).values()}"
                                th:text="#{'bug.priority.' + ${p}}"
                                th:value="${p}"></option>
                    </select>
                    <span class="text-danger" th:errors="*{priority}" th:if="${#fields.hasErrors('priority')}"></span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="attachment" th:text="#{bug.form.upload_attachments}">Carregar Anexos (até 5 arquivos)</label>
                <input type="file" class="form-control" id="attachment" name="attachment" multiple>
                <div th:if="${fileAttachmentError}" class="text-danger" th:text="${fileAttachmentError}"></div>
            </div>

            <button class="btn btn-primary" type="submit" th:text="${isEditMode} ? #{form.save_changes} : #{form.create_bug}">Salvar/Criar</button>
            <a class="btn btn-secondary" th:href="@{/projects/{projectId}/sessions/{testSessionId}(projectId=${bugRequest.projectId}, testSessionId=${bugRequest.testSessionId})}" th:text="#{form.cancel}">Cancelar</a>
        </form>
    </div>
</section>
</body>
</html>
