<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{bug.form.title}">Report Bug</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2 th:text="#{bug.form.header}">Report a New Bug</h2>
        <form enctype="multipart/form-data" method="post" th:action="@{/bugs}" th:object="${bugRequest}">
            <input th:field="*{testSessionId}" type="hidden"/>
            <div class="mb-3">
                <label class="form-label" for="title" th:text="#{bug.form.bug_title}">Title</label>
                <input class="form-control" id="title" required th:field="*{title}" type="text"/>
                <span class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>
            <div class="mb-3">
                <label class="form-label" for="description" th:text="#{form.description}">Description</label>
                <textarea class="form-control" id="description" rows="3" th:field="*{description}"></textarea>
                <span class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>
            <div class="mb-3">
                <label class="form-label" for="stepsToReproduce" th:text="#{bug.form.steps}">Steps to Reproduce</label>
                <textarea class="form-control" id="stepsToReproduce" rows="5" th:field="*{stepsToReproduce}"></textarea>
                <span class="text-danger" th:if="${#fields.hasErrors('stepsToReproduce')}" th:errors="*{stepsToReproduce}"></span>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="status" th:text="#{bug.form.status}">Status</label>
                    <select class="form-select" id="status" th:field="*{status}">
                        <option th:each="s : ${T(br.ufscar.glitchdex.domain.BugStatus).values()}" th:text="${s.name()}"
                                th:value="${s}"></option>
                    </select>
                    <span class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="severity" th:text="#{bug.form.severity}">Severity</label>
                    <select class="form-select" id="severity" th:field="*{severity}">
                        <option th:each="s : ${T(br.ufscar.glitchdex.domain.BugSeverity).values()}"
                                th:text="${s.name()}"
                                th:value="${s}"></option>
                    </select>
                    <span class="text-danger" th:if="${#fields.hasErrors('severity')}" th:errors="*{severity}"></span>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="priority" th:text="#{bug.form.priority}">Priority</label>
                    <select class="form-select" id="priority" th:field="*{priority}">
                        <option th:each="p : ${T(br.ufscar.glitchdex.domain.BugPriority).values()}"
                                th:text="${p.name()}"
                                th:value="${p}"></option>
                    </select>
                    <span class="text-danger" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></span>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="attachment" th:text="#{bug.form.attachment.optional}">Attachment
                    (Optional)</label>
                <input class="form-control" id="attachment" name="attachment" type="file"/>
            </div>
            <button class="btn btn-primary" th:text="#{bug.form.submit}" type="submit">Submit Bug</button>
            <a class="btn btn-secondary" th:href="@{/sessions/{id}(id=${bugRequest.testSessionId})}"
               th:text="#{form.cancel}">Cancel</a>
        </form>
    </div>
</section>
</body>
</html>
