<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{strategy.list.title}">Strategies</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <div class="alert alert-success" role="alert" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" role="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>


        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="#{strategy.list.header}">Available Strategies</h2>
            <a class="btn btn-primary" sec:authorize="hasAuthority('ADMIN')" th:href="@{/strategies/new}"
               th:text="#{strategy.list.new_strategy}">New Strategy</a>
        </div>

        <div class="row">
            <div class="col" th:if="${strategies.isEmpty()}">
                <p th:text="#{strategy.list.no_strategies}">No strategies found.</p>
            </div>
            <div class="col-md-6 col-lg-4 mb-4" th:each="strategy : ${strategies}">
                <div class="card h-100 card-project">
                    <img alt="Strategy Image" class="card-img-top" style="height: 200px; object-fit: cover;"
                         th:if="${strategy.imageUrl}" th:src="@{${strategy.imageUrl}}">
                    <img alt="Strategy Image" class="card-img-top" style="height: 200px; object-fit: cover;"
                         th:src="@{/images/placeholder.png}" th:unless="${strategy.imageUrl}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${strategy.name}">Strategy Name</h5>
                        <p class="card-text" th:text="${strategy.description}">Strategy description.</p>
                    </div>
                    <div class="card-footer d-flex justify-content-between align-items-center">
                        <a class="btn btn-info" th:href="@{/strategies/{id}(id=${strategy.id})}"
                           th:text="#{home.view_details}">Details</a>
                        <div sec:authorize="hasAuthority('ADMIN')">
                            <a class="btn btn-secondary"
                               th:href="@{/strategies/{id}/edit(id=${strategy.id})}"
                               th:text="#{form.edit}">Edit</a>
                            <form class="d-inline" method="post"
                                  onsubmit="return confirm(document.getElementById('delete-confirm-msg').value);"
                                  th:action="@{/strategies/{id}/delete(id=${strategy.id})}">
                                <input id="delete-confirm-msg" th:value="#{form.delete.confirm}" type="hidden"/>
                                <button class="btn btn-danger-outline" th:text="#{form.delete}" type="submit">Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
