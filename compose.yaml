services: # Database Service (PostgreSQL)
  db:
    image: postgres:17-alpine
    container_name: glitchdex-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glitchdex}
      POSTGRES_USER: ${POSTGRES_USER:-glitchdex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      # Persists database data across container restarts
      - glitchdex_db_data:/var/lib/postgresql/data
    healthcheck:
      # Tests if the database is ready to accept connections
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glitchdex} -d ${POSTGRES_DB:-glitchdex}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Application Service (GlitchDex)
  app:
    container_name: glitchdex-app
    # Builds the Docker image from the Dockerfile in the current directory
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        # Waits for the database to be healthy before starting the application
        condition: service_healthy
    restart: unless-stopped

# Named volume for persisting database data
volumes:
  glitchdex_db_data:
    driver: local